<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompting redesign — your call needed — CroquetClaude</title>
    <meta name="description" content="Five questions. Takes under five minutes.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M6 28V18a10 10 0 0120 0v10' fill='none' stroke='%232d6a4f' stroke-width='4' stroke-linecap='round'/></svg>">
    <link rel="stylesheet" href="/styles.css">
    <style>
        /* ---- Mission-scoped styles: prompting-redesign-2026-04 ---- */

        .q-card {
            background: #fff;
            border: 1px solid #e0d8c8;
            border-radius: 12px;
            padding: 1.75rem 1.75rem 1.5rem;
            margin-bottom: 1.25rem;
        }

        .q-card.answered {
            border-color: #2d6a4f;
        }

        .q-card.missing {
            border-color: #b83227;
            box-shadow: 0 0 0 2px rgba(184,50,39,0.15);
        }

        .q-heading {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 0.35rem;
        }

        .q-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 0 0 1.1rem;
            line-height: 1.55;
        }

        .q-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .btn-q {
            padding: 0.5rem 1rem;
            border: 1.5px solid #2d6a4f;
            border-radius: 6px;
            background: #fff;
            color: #2d6a4f;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .btn-q:hover {
            background: #f0f7f4;
        }

        .btn-q.selected {
            background: #2d6a4f;
            color: #fff;
            border-color: #2d6a4f;
        }

        .btn-q.btn-park {
            border-color: #8a8a8a;
            color: #5a5a5a;
        }

        .btn-q.btn-park:hover {
            background: #f5f5f5;
        }

        .btn-q.btn-park.selected {
            background: #6b6b6b;
            color: #fff;
            border-color: #6b6b6b;
        }

        .q-reveal {
            display: none;
            margin-top: 1rem;
        }

        .q-reveal.visible {
            display: block;
        }

        .q-reveal label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.35rem;
        }

        .q-reveal textarea {
            width: 100%;
            min-height: 80px;
            padding: 0.6rem 0.75rem;
            border: 1px solid #d0c8b8;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            line-height: 1.5;
            resize: vertical;
            box-sizing: border-box;
            background: #fefae0;
        }

        .q-reveal textarea:focus {
            outline: 2px solid #2d6a4f;
            outline-offset: 1px;
        }

        .q-freetext-area {
            width: 100%;
            min-height: 100px;
            padding: 0.6rem 0.75rem;
            border: 1px solid #d0c8b8;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            line-height: 1.5;
            resize: vertical;
            box-sizing: border-box;
            background: #fefae0;
        }

        .q-freetext-area:focus {
            outline: 2px solid #2d6a4f;
            outline-offset: 1px;
        }

        .mission-banner {
            background: #1a3d2a;
            color: #fefae0;
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            line-height: 1.5;
            font-weight: 500;
        }

        .q-number {
            display: inline-block;
            background: #bc6c25;
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            padding: 0.15rem 0.55rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .q-card {
                padding: 1.25rem 1.1rem 1.1rem;
            }
            .btn-q {
                font-size: 0.85rem;
                padding: 0.45rem 0.85rem;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="/" class="wordmark">
            <img src="/assets/drawn-claude.png" alt="" class="wordmark-avatar">
            <span>CroquetClaude</span>
        </a>
        <span class="mission-title">Prompting redesign</span>
    </header>

    <div id="app">
        <!-- Content injected by app.js + renderMission() -->
    </div>

    <script src="/app.js"></script>
    <script>
    // -----------------------------------------------------------------------
    // Mission: prompting-redesign-2026-04
    // 5 structured questions -- Wade approves/directs the prompting redesign plan
    // -----------------------------------------------------------------------

    window.renderMission = function(tokenRecord) {
        const respondentName = tokenRecord.respondent_name || 'Wade';
        const firstName = respondentName.split(' ')[0].split(',')[0];
        const draft = tokenRecord.draft_payload || null;

        // Answer state -- Q1/Q2/Q3/Q5 require a radio pick; Q4 is optional free text
        const answers = {
            q1: { answer: null, notes: '' },
            q2: { answer: null, notes: '' },
            q3: { answer: null, notes: '' },
            q4: { answer: '' },
            q5: { answer: null, notes: '' }
        };

        const requiredQuestions = ['q1', 'q2', 'q3', 'q5'];

        // Pre-load answers from draft
        if (draft && draft.questions) {
            Object.keys(draft.questions).forEach(function(k) {
                if (answers.hasOwnProperty(k)) {
                    var d = draft.questions[k];
                    if (d.answer !== undefined) answers[k].answer = d.answer;
                    if (d.notes !== undefined && answers[k].notes !== undefined) {
                        answers[k].notes = d.notes;
                    }
                }
            });
        }

        var autosave = null;

        function buildPayload() {
            var questions = {};
            Object.keys(answers).forEach(function(k) {
                questions[k] = {
                    answer: answers[k].answer || null,
                    notes: answers[k].notes || ''
                };
            });
            return { questions: questions };
        }

        function updateValidation() {
            return requiredQuestions.filter(function(k) {
                return answers[k].answer === null;
            });
        }

        // Build a notes reveal area
        function makeReveal(labelText, questionKey) {
            var div = document.createElement('div');
            div.className = 'q-reveal';

            var lbl = document.createElement('label');
            lbl.textContent = labelText;
            div.appendChild(lbl);

            var ta = document.createElement('textarea');
            ta.placeholder = 'Type here\u2026';
            ta.value = answers[questionKey].notes || '';
            ta.addEventListener('input', function() {
                answers[questionKey].notes = ta.value;
                if (autosave) autosave.save();
            });
            div.appendChild(ta);
            return div;
        }

        // Build a radio-pick question card
        // revealConfig = { values: [...], label: '...' } or null
        function makeRadioCard(questionKey, numberLabel, heading, subtitle, buttons, revealConfig) {
            var card = document.createElement('div');
            card.className = 'q-card';
            card.dataset.key = questionKey;

            var num = document.createElement('div');
            num.className = 'q-number';
            num.textContent = numberLabel;
            card.appendChild(num);

            var h = document.createElement('div');
            h.className = 'q-heading';
            h.textContent = heading;
            card.appendChild(h);

            var sub = document.createElement('p');
            sub.className = 'q-subtitle';
            sub.textContent = subtitle;
            card.appendChild(sub);

            var btnRow = document.createElement('div');
            btnRow.className = 'q-buttons answer-buttons';
            card.appendChild(btnRow);

            var reveal = null;
            if (revealConfig) {
                reveal = makeReveal(revealConfig.label, questionKey);
                // Restore reveal visibility from draft
                if (revealConfig.values.indexOf(answers[questionKey].answer) !== -1) {
                    reveal.classList.add('visible');
                }
                card.appendChild(reveal);
            }

            buttons.forEach(function(btnDef) {
                var b = document.createElement('button');
                b.className = 'btn-q btn-answer';
                if (btnDef.park) b.classList.add('btn-park');
                b.setAttribute('type', 'button');
                b.textContent = btnDef.label;
                b.dataset.value = btnDef.value;

                // Restore selected state from draft
                if (answers[questionKey].answer === btnDef.value) {
                    b.classList.add('selected');
                    card.classList.add('answered');
                }

                b.addEventListener('click', function() {
                    btnRow.querySelectorAll('.btn-q').forEach(function(x) {
                        x.classList.remove('selected');
                    });
                    b.classList.add('selected');
                    answers[questionKey].answer = btnDef.value;
                    card.classList.add('answered');
                    card.classList.remove('missing');

                    if (reveal && revealConfig) {
                        if (revealConfig.values.indexOf(btnDef.value) !== -1) {
                            reveal.classList.add('visible');
                            var ta = reveal.querySelector('textarea');
                            if (ta) ta.focus();
                        } else {
                            reveal.classList.remove('visible');
                        }
                    }

                    updateValidation();
                    if (autosave) autosave.save();
                });

                btnRow.appendChild(b);
            });

            return card;
        }

        // Build a free-text-only question card (Q4)
        function makeFreetextCard(questionKey, numberLabel, heading, subtitle) {
            var card = document.createElement('div');
            card.className = 'q-card';
            card.dataset.key = questionKey;
            card.dataset.optional = 'true';

            var num = document.createElement('div');
            num.className = 'q-number';
            num.textContent = numberLabel;
            card.appendChild(num);

            var h = document.createElement('div');
            h.className = 'q-heading';
            h.textContent = heading;
            card.appendChild(h);

            var sub = document.createElement('p');
            sub.className = 'q-subtitle';
            sub.textContent = subtitle;
            card.appendChild(sub);

            var ta = document.createElement('textarea');
            ta.className = 'q-freetext-area';
            ta.placeholder = 'Optional \u2014 leave blank if nothing comes to mind.';
            ta.value = answers[questionKey].answer || '';
            ta.addEventListener('input', function() {
                answers[questionKey].answer = ta.value;
                if (autosave) autosave.save();
            });
            card.appendChild(ta);

            return card;
        }

        // ---- Build the DOM ----
        var app = document.getElementById('app');
        var container = document.createElement('div');
        container.className = 'container';

        // Opener
        var opener = document.createElement('div');
        opener.className = 'opener';
        opener.innerHTML =
            '<p>' + firstName + ' \u2014 you\u2019ve just read the synthesis report. Source documents: ' +
            '<a href="https://vault.croquetclaude.com/inbox/dispatch-prompting-redesign-2026-04-20.md" target="_blank">synthesis report</a>, ' +
            '<a href="https://vault.croquetclaude.com/inbox/research-prompting-best-practices-2026-04-20.md" target="_blank">research (2,800 words, 13 sources)</a>, ' +
            '<a href="https://vault.croquetclaude.com/inbox/token-waste-audit-2026-04-20.md" target="_blank">14-day waste audit</a>, ' +
            '<a href="https://vault.croquetclaude.com/system/claude-working/boards/prompting-redesign.md" target="_blank">14-task kanban</a>.' +
            '</p>' +
            '<p class="opener-note"><span class="opener-note-icon" aria-hidden="true">\u270e</span> ' +
            'Your answers save automatically as you go. Close the tab and come back any time \u2014 the link picks up where you left off until you press <em>Lock in my call</em>.</p>';
        container.appendChild(opener);

        // Headline banner
        var banner = document.createElement('div');
        banner.className = 'mission-banner';
        banner.textContent = '~413K tokens wasted in 14 days. Phase 1 (~2hr work) targets ~270K of it. Need your call to start.';
        container.appendChild(banner);

        // Q1 -- Plan direction
        var q1 = makeRadioCard(
            'q1',
            'Q1 of 5',
            'Plan direction \u2014 approve, redirect, or park?',
            'Three phases. Phase 1 (this week, 5 quick wins, ~2hr). Phase 2 (next week, brief-quality + SOUL audit). Phase 3 (strategic + 2-week retro).',
            [
                { label: 'Approve as-is',         value: 'approve-as-is' },
                { label: 'Approve with changes',  value: 'approve-with-changes' },
                { label: 'Redirect',               value: 'redirect' },
                { label: 'Park',                   value: 'park', park: true }
            ],
            {
                values: ['approve-with-changes', 'redirect'],
                label: 'What changes / where to redirect?'
            }
        );
        container.appendChild(q1);

        // Q2 -- SOUL.md audit
        var q2 = makeRadioCard(
            'q2',
            'Q2 of 5',
            'SOUL.md audit across all 16 offshoots \u2014 go ahead?',
            'Only Phase 2 item that needs your explicit nod. HR Claude proposes per-offshoot diffs, you review.',
            [
                { label: 'Approve full audit',                    value: 'approve-full' },
                { label: 'Approve in batches (4 most-used first)', value: 'approve-batches' },
                { label: 'Park',                                   value: 'park', park: true }
            ],
            {
                values: ['approve-batches'],
                label: 'Which 4 offshoots first?'
            }
        );
        container.appendChild(q2);

        // Q3 -- Phase 1 priority
        var q3 = makeRadioCard(
            'q3',
            'Q3 of 5',
            'Phase 1 \u2014 ship all 5, or focus?',
            'F1.1 + F1.5 alone (Output Format patch + heartbeat audit) cost 15 min and kill the biggest failure mode. F1.3 + F1.4 ship two known hook fixes sitting unshipped. F1.2 is the bigger build (/dispatch slash command).',
            [
                { label: 'Ship all 5',               value: 'ship-all-5' },
                { label: 'F1.1 + F1.5 first, rest after', value: 'f1-1-and-f1-5-first' },
                { label: 'Other order',              value: 'other-order' }
            ],
            {
                values: ['other-order'],
                label: 'Which order?'
            }
        );
        container.appendChild(q3);

        // Q4 -- Anything missed? (free text, optional)
        var q4 = makeFreetextCard(
            'q4',
            'Q4 of 5',
            'Anything I missed?',
            'Failure modes I haven\'t named, token burns the audit didn\'t see, intuitions about waste sources.'
        );
        container.appendChild(q4);

        // Q5 -- Retro success metric
        var q5 = makeRadioCard(
            'q5',
            'Q5 of 5',
            'Retro gate at 2026-05-04 \u2014 right success metric?',
            'Currently: <100K wasted in rolling 14-day window vs ~413K baseline. Other options: dispatch count reduction, error count, time-to-result.',
            [
                { label: 'Tokens (<100K) is right',  value: 'tokens-lt-100k' },
                { label: 'Use a different metric',   value: 'different-metric' }
            ],
            {
                values: ['different-metric'],
                label: 'Which metric?'
            }
        );
        container.appendChild(q5);

        // Validation error display
        var validationError = document.createElement('div');
        validationError.className = 'validation-error';
        validationError.id = 'validation-error';
        container.appendChild(validationError);

        // Submit section
        var submitWrap = document.createElement('div');
        submitWrap.className = 'submit-wrap';

        var draftSaved = document.createElement('span');
        draftSaved.id = 'draft-saved-indicator';
        draftSaved.className = 'draft-saved-indicator';
        draftSaved.textContent = '\u2022 Draft saved';
        submitWrap.appendChild(draftSaved);

        var submitBtn = document.createElement('button');
        submitBtn.id = 'submit-btn';
        submitBtn.className = 'btn-submit';
        submitBtn.setAttribute('type', 'button');
        submitBtn.textContent = 'Lock in my call';

        var errorMsg = document.createElement('div');
        errorMsg.className = 'error-message';
        errorMsg.id = 'error-message';
        errorMsg.innerHTML = 'Something went wrong \u2014 please let us know at <a href="mailto:hello@croquetclaude.com">hello@croquetclaude.com</a>.';

        submitBtn.addEventListener('click', async function() {
            var unanswered = updateValidation();

            document.querySelectorAll('.q-card').forEach(function(card) {
                var k = card.dataset.key;
                var isOptional = card.dataset.optional === 'true';
                if (!isOptional && k && answers[k] && answers[k].answer === null) {
                    card.classList.add('missing');
                } else {
                    card.classList.remove('missing');
                }
            });

            if (unanswered.length > 0) {
                var ve = document.getElementById('validation-error');
                ve.textContent = unanswered.length === 1
                    ? 'One question still needs an answer \u2014 it\'s highlighted above.'
                    : unanswered.length + ' questions still need answers \u2014 they\'re highlighted above.';
                ve.classList.add('visible');
                var firstMissing = document.querySelector('.q-card.missing');
                if (firstMissing) {
                    firstMissing.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                return;
            }

            var ve = document.getElementById('validation-error');
            ve.classList.remove('visible');

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Sending\u2026';

            var responsePayload = buildPayload();
            var ok = await window.submitMission(tokenRecord, responsePayload, respondentName);

            if (!ok) {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Lock in my call';
                var em = document.getElementById('error-message');
                em.classList.add('visible');
            }
        });

        submitWrap.appendChild(submitBtn);
        submitWrap.appendChild(errorMsg);
        container.appendChild(submitWrap);

        // Mount
        app.innerHTML = '';
        app.appendChild(container);

        // Initialise autosave after DOM is mounted
        autosave = window.createAutosave(tokenRecord, buildPayload);
    };
    </script>
</body>
</html>
