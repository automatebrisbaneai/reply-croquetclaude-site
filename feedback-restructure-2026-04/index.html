<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback restructure review — CroquetClaude</title>
    <meta name="description" content="Phase 7a feedback-restructure proposal — structured review.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M6 28V18a10 10 0 0120 0v10' fill='none' stroke='%232d6a4f' stroke-width='4' stroke-linecap='round'/></svg>">
    <link rel="stylesheet" href="/styles.css">
    <style>
        /* ---- Mission-specific styles: feedback-restructure-2026-04 ---- */

        .group-trigger {
            font-style: italic;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
        }

        .group-meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: baseline;
            margin-bottom: 0.4rem;
        }

        .group-count-badge {
            background: var(--cream-dark, #f0e9c8);
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 0.1rem 0.5rem;
            border-radius: 20px;
            white-space: nowrap;
        }

        .group-samples {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }

        .group-samples code {
            background: var(--cream-dark, #f0e9c8);
            padding: 0.05rem 0.3rem;
            border-radius: 3px;
            font-size: 0.78rem;
            font-family: 'Courier New', monospace;
        }

        .group-merges-into {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }

        .group-merges-into code {
            background: rgba(45, 106, 79, 0.1);
            color: var(--primary, #2d6a4f);
            padding: 0.05rem 0.35rem;
            border-radius: 3px;
            font-size: 0.78rem;
            font-family: 'Courier New', monospace;
        }

        .group-note {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-style: italic;
            margin-top: 0.35rem;
            padding-top: 0.35rem;
            border-top: 1px dashed var(--border, #ccc);
        }

        .archive-reason {
            font-size: 0.88rem;
            color: var(--text-secondary);
            font-style: italic;
            margin-top: 0.2rem;
        }

        .collision-proposal {
            font-size: 0.88rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }

        /* Section D: always-visible notes area */
        .notes-area-always {
            margin-top: 0.75rem;
        }

        .notes-area-always label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }

        .notes-area-always textarea {
            width: 100%;
            min-height: 3.5rem;
            padding: 0.5rem 0.65rem;
            border: 1px solid var(--border, #ccc);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.9rem;
            line-height: 1.5;
            background: var(--cream-bg, #fefae0);
            resize: vertical;
            box-sizing: border-box;
        }

        /* Free-text override block */
        .freetext-wrap {
            margin-top: 2rem;
            padding: 1.25rem 1.5rem;
            background: var(--cream-dark, #f0e9c8);
            border: 1px solid var(--border, #ccc);
            border-radius: 6px;
        }

        .freetext-wrap label {
            display: block;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary, #1a1a1a);
            margin-bottom: 0.4rem;
        }

        .freetext-helper {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.65rem;
            margin-top: 0;
        }

        .freetext-wrap textarea {
            width: 100%;
            min-height: 6rem;
            padding: 0.6rem 0.75rem;
            border: 1px solid var(--border, #ccc);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.9rem;
            line-height: 1.6;
            background: var(--cream-bg, #fefae0);
            resize: vertical;
            box-sizing: border-box;
        }

        /* Terracotta accent buttons for non-primary options */
        .btn-answer.btn-terracotta {
            border-color: var(--accent, #bc6c25);
            color: var(--accent, #bc6c25);
        }

        .btn-answer.btn-terracotta:hover,
        .btn-answer.btn-terracotta.selected {
            background: var(--accent, #bc6c25);
            color: #fff;
            border-color: var(--accent, #bc6c25);
        }

        /* Outline style for third-option buttons */
        .btn-answer.btn-outline {
            background: transparent;
            border: 1.5px solid var(--primary, #2d6a4f);
            color: var(--primary, #2d6a4f);
        }

        .btn-answer.btn-outline:hover,
        .btn-answer.btn-outline.selected {
            background: var(--primary, #2d6a4f);
            color: #fff;
            border-color: var(--primary, #2d6a4f);
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="/" class="wordmark">
            <img src="/assets/drawn-claude.png" alt="" class="wordmark-avatar">
            <span>CroquetClaude</span>
        </a>
        <span class="mission-title">Feedback restructure &mdash; Phase 7a review</span>
    </header>

    <div id="app">
        <!-- Content injected by app.js + renderMission() -->
    </div>

    <script src="/app.js"></script>
    <script>
    // -----------------------------------------------------------------------
    // Mission — feedback-restructure-2026-04
    // -----------------------------------------------------------------------

    window.renderMission = function(tokenRecord) {
        var seed           = tokenRecord.payload_seed;
        var respondentName = tokenRecord.respondent_name || 'there';
        var firstName      = respondentName.split(' ')[0].split(',')[0];
        var draft          = tokenRecord.draft_payload || null;

        // Pull sections from seed
        var groups       = (seed && seed.sections && seed.sections.groups)             || [];
        var archives     = (seed && seed.sections && seed.sections.archive_candidates) || [];
        var collisions   = (seed && seed.sections && seed.sections.collisions)          || [];
        var decisions    = (seed && seed.sections && seed.sections.decisions)           || [];

        // Card answer store
        var answers = {};
        function keyFor(section, idx) { return section + '/' + idx; }

        groups.forEach(function(_, i)     { answers[keyFor('groups', i)]     = { answer: null, notes: '' }; });
        archives.forEach(function(_, i)   { answers[keyFor('archive', i)]    = { answer: null, notes: '' }; });
        collisions.forEach(function(_, i) { answers[keyFor('collision', i)]  = { answer: null, notes: '' }; });
        decisions.forEach(function(_, i)  { answers[keyFor('decision', i)]   = { answer: null, notes: '' }; });

        // Pre-load from saved draft
        if (draft && Array.isArray(draft.cards)) {
            draft.cards.forEach(function(entry) {
                var k = entry.key;
                if (k && answers.hasOwnProperty(k)) {
                    answers[k].answer = (entry.answer !== undefined) ? entry.answer : null;
                    answers[k].notes  = entry.notes || '';
                }
            });
        }

        // Autosave: forward-declared, assigned after DOM mount
        var autosave = null;

        function buildPayload() {
            var cards = Object.keys(answers).map(function(k) {
                return { key: k, answer: answers[k].answer, notes: answers[k].notes || '' };
            });
            var ftEl = document.getElementById('freetext-overrides');
            return {
                cards: cards,
                freetext_overrides: ftEl ? ftEl.value : ''
            };
        }

        function updateValidationState() {
            return Object.keys(answers).filter(function(k) { return answers[k].answer === null; });
        }

        // ---- Generic card builder ----
        // buttonsConfig: [{ label, value, style }]
        //   style: 'primary' | 'terracotta' | 'outline'
        // notesMode: 'none' | 'conditional' | 'always'
        //   conditional = open notes for any non-first button click
        //   always = notes textarea always visible (Section D)
        function buildCard(sectionKey, idx, cardTitle, cardQuestion, extraContentFn, buttonsConfig, notesMode) {
            var k    = keyFor(sectionKey, idx);
            var card = document.createElement('div');
            card.className   = 'card';
            card.dataset.key = k;
            card.setAttribute('role', 'group');
            card.setAttribute('aria-label', cardTitle);

            var nameEl = document.createElement('div');
            nameEl.className   = 'card-name';
            nameEl.textContent = cardTitle;
            card.appendChild(nameEl);

            if (cardQuestion) {
                var metaEl = document.createElement('div');
                metaEl.className   = 'card-meta';
                metaEl.textContent = cardQuestion;
                card.appendChild(metaEl);
            }

            if (typeof extraContentFn === 'function') {
                extraContentFn(card);
            }

            // Button row
            var btnRow = document.createElement('div');
            btnRow.className = 'answer-buttons';

            buttonsConfig.forEach(function(btn, bIdx) {
                var b = document.createElement('button');
                b.className = 'btn-answer';
                if (btn.style === 'terracotta') b.classList.add('btn-terracotta');
                if (btn.style === 'outline')    b.classList.add('btn-outline');
                b.textContent   = btn.label;
                b.dataset.value = btn.value;
                b.setAttribute('type', 'button');

                b.addEventListener('click', function() {
                    btnRow.querySelectorAll('.btn-answer').forEach(function(x) {
                        x.classList.remove('selected');
                    });
                    b.classList.add('selected');
                    answers[k].answer = btn.value;

                    if (notesMode === 'conditional') {
                        var notesArea = card.querySelector('.notes-area');
                        if (notesArea) {
                            if (bIdx > 0) {
                                notesArea.classList.add('visible');
                                var ta = notesArea.querySelector('textarea');
                                if (ta) ta.focus();
                            } else {
                                notesArea.classList.remove('visible');
                            }
                        }
                    }

                    card.classList.add('answered');
                    card.classList.remove('missing');
                    updateValidationState();
                    if (autosave) autosave.save();
                });

                btnRow.appendChild(b);
            });

            card.appendChild(btnRow);

            // Notes areas
            if (notesMode === 'conditional') {
                var notesArea  = document.createElement('div');
                notesArea.className = 'notes-area';
                var notesLabel = document.createElement('label');
                notesLabel.style.cssText = 'display:block;font-size:0.85rem;color:var(--text-secondary);margin-bottom:0.3rem;';
                notesLabel.textContent   = 'Notes (optional):';
                var notesTA = document.createElement('textarea');
                notesTA.placeholder = 'Anything specific to flag\u2026';
                notesTA.setAttribute('aria-label', 'Notes for ' + cardTitle);
                notesTA.addEventListener('input', function() {
                    answers[k].notes = notesTA.value;
                    if (autosave) autosave.save();
                });
                notesArea.appendChild(notesLabel);
                notesArea.appendChild(notesTA);
                card.appendChild(notesArea);
            } else if (notesMode === 'always') {
                var alwaysWrap  = document.createElement('div');
                alwaysWrap.className = 'notes-area-always';
                var alwaysLabel = document.createElement('label');
                alwaysLabel.textContent = 'Notes (optional):';
                var alwaysTA    = document.createElement('textarea');
                alwaysTA.placeholder = 'Anything to add, qualify, or flag\u2026';
                alwaysTA.setAttribute('aria-label', 'Notes for ' + cardTitle);
                alwaysTA.addEventListener('input', function() {
                    answers[k].notes = alwaysTA.value;
                    if (autosave) autosave.save();
                });
                alwaysWrap.appendChild(alwaysLabel);
                alwaysWrap.appendChild(alwaysTA);
                card.appendChild(alwaysWrap);
            }

            return card;
        }

        // ---- Build page ----
        var app       = document.getElementById('app');
        var container = document.createElement('div');
        container.className = 'container';

        // ---- Opener ----
        var opener = document.createElement('div');
        opener.className = 'opener';
        opener.innerHTML =
            '<p>' + firstName + ', \u2014</p>' +
            '<p>This is the Phase 7a feedback-restructure proposal in reviewable form. The full doc is at ' +
            '<code>inbox/feedback-restructure-proposal-2026-04-18.md</code> \u2014 this page asks you the ' +
            'decisions that doc ends with, in a form where each answer is tracked and nothing slips.</p>' +
            '<p style="margin-top:1rem;padding-top:0.75rem;border-top:1px dashed var(--border,#ccc);">' +
            '<em style="font-size:0.92rem;">Your answers save automatically as you go. Close the tab and come back any time \u2014 ' +
            'the link picks up where you left off until you press Send my answers.</em></p>';
        container.appendChild(opener);

        // ============================================================
        // Section A — Group bucketing
        // ============================================================
        var divA = document.createElement('hr');
        divA.className = 'section-divider';
        container.appendChild(divA);

        var headA = document.createElement('h2');
        headA.className   = 'section-heading';
        headA.textContent = 'Group bucketing (' + groups.length + ')';
        container.appendChild(headA);

        var subA = document.createElement('p');
        subA.className   = 'section-subtitle';
        subA.textContent = 'One card per proposed trigger-moment group. Each group collapses N source files into one merged file. Say whether the bucketing reads right.';
        container.appendChild(subA);

        var gridA = document.createElement('div');
        gridA.className = 'cards-grid';

        groups.forEach(function(group, i) {
            var buttonsA = [
                { label: 'Bucketing right', value: 'right',  style: 'primary' },
                { label: 'Needs revision',  value: 'revise', style: 'terracotta' }
            ];

            var card = buildCard(
                'groups', i,
                group.title,
                null,
                function(el) {
                    var trigEl = document.createElement('div');
                    trigEl.className   = 'group-trigger';
                    trigEl.textContent = 'Trigger: ' + group.trigger;
                    el.appendChild(trigEl);

                    var metaRow = document.createElement('div');
                    metaRow.className = 'group-meta-row';

                    var badge = document.createElement('span');
                    badge.className   = 'group-count-badge';
                    badge.textContent = group.count + ' files';
                    metaRow.appendChild(badge);

                    var merges = document.createElement('span');
                    merges.className = 'group-merges-into';
                    merges.innerHTML = 'Merges into: <code>' + group.merged_into + '</code>';
                    metaRow.appendChild(merges);

                    el.appendChild(metaRow);

                    if (group.sample_files && group.sample_files.length > 0) {
                        var samples = document.createElement('div');
                        samples.className = 'group-samples';
                        samples.innerHTML = 'Sample files: ' + group.sample_files.map(function(f) {
                            return '<code>' + f + '</code>';
                        }).join(', ');
                        el.appendChild(samples);
                    }

                    if (group.note) {
                        var noteEl = document.createElement('div');
                        noteEl.className   = 'group-note';
                        noteEl.textContent = group.note;
                        el.appendChild(noteEl);
                    }
                },
                buttonsA,
                'conditional'
            );
            gridA.appendChild(card);
        });
        container.appendChild(gridA);

        // ============================================================
        // Section B — Archive candidates
        // ============================================================
        var divB = document.createElement('hr');
        divB.className = 'section-divider';
        container.appendChild(divB);

        var headB = document.createElement('h2');
        headB.className   = 'section-heading';
        headB.textContent = 'Archive candidates (' + archives.length + ')';
        container.appendChild(headB);

        var subB = document.createElement('p');
        subB.className   = 'section-subtitle';
        subB.textContent = 'Files flagged as stale or superseded. Archive moves them to archives/feedback-stale-2026-04/ with a forwarding pointer.';
        container.appendChild(subB);

        var gridB = document.createElement('div');
        gridB.className = 'cards-grid';

        archives.forEach(function(item, i) {
            var buttonsB = [
                { label: 'Archive',                   value: 'archive',    style: 'primary' },
                { label: 'Keep + merge into a group', value: 'keep-merge', style: 'terracotta' },
                { label: 'Keep flat where it is',     value: 'keep-flat',  style: 'outline' }
            ];

            var card = buildCard(
                'archive', i,
                item.filename,
                null,
                function(el) {
                    var reasonEl = document.createElement('div');
                    reasonEl.className   = 'archive-reason';
                    reasonEl.textContent = item.reason;
                    el.appendChild(reasonEl);
                },
                buttonsB,
                'conditional'
            );
            gridB.appendChild(card);
        });
        container.appendChild(gridB);

        // ============================================================
        // Section C — Filename collisions
        // ============================================================
        var divC = document.createElement('hr');
        divC.className = 'section-divider';
        container.appendChild(divC);

        var headC = document.createElement('h2');
        headC.className   = 'section-heading';
        headC.textContent = 'Filename collisions (' + collisions.length + ')';
        container.appendChild(headC);

        var subC = document.createElement('p');
        subC.className   = 'section-subtitle';
        subC.textContent = 'Seven filenames exist in both system/memory/ and system/memory/claude-code/ with different content. Pick one.';
        container.appendChild(subC);

        var gridC = document.createElement('div');
        gridC.className = 'cards-grid';

        collisions.forEach(function(item, i) {
            var buttonsC = [
                { label: 'Accept proposal', value: 'accept',   style: 'primary' },
                { label: 'Override',        value: 'override', style: 'terracotta' }
            ];

            var card = buildCard(
                'collision', i,
                item.filename,
                null,
                function(el) {
                    var propEl = document.createElement('div');
                    propEl.className   = 'collision-proposal';
                    propEl.textContent = item.proposal;
                    el.appendChild(propEl);
                },
                buttonsC,
                'conditional'
            );
            gridC.appendChild(card);
        });
        container.appendChild(gridC);

        // ============================================================
        // Section D — Top-level decisions
        // ============================================================
        var divD = document.createElement('hr');
        divD.className = 'section-divider';
        container.appendChild(divD);

        var headD = document.createElement('h2');
        headD.className   = 'section-heading';
        headD.textContent = 'Top-level decisions (' + decisions.length + ')';
        container.appendChild(headD);

        var subD = document.createElement('p');
        subD.className   = 'section-subtitle';
        subD.textContent = 'The three decisions that gate Phase 7b execution.';
        container.appendChild(subD);

        var gridD = document.createElement('div');
        gridD.className = 'cards-grid';

        decisions.forEach(function(dec, i) {
            var buttonsD = (dec.options || []).map(function(opt, oIdx) {
                var style;
                if (oIdx === 0)         style = 'primary';
                else if (oIdx % 2 === 1) style = 'terracotta';
                else                     style = 'outline';
                return { label: opt.label, value: opt.value, style: style };
            });

            var card = buildCard(
                'decision', i,
                dec.title,
                dec.question,
                null,
                buttonsD,
                'always'
            );
            gridD.appendChild(card);
        });
        container.appendChild(gridD);

        // ============================================================
        // Free-text overrides
        // ============================================================
        var divFt = document.createElement('hr');
        divFt.className = 'section-divider';
        container.appendChild(divFt);

        var freetextWrap = document.createElement('div');
        freetextWrap.className = 'freetext-wrap';

        var ftLabel = document.createElement('label');
        ftLabel.setAttribute('for', 'freetext-overrides');
        ftLabel.textContent = 'Per-file regroup overrides (optional)';
        freetextWrap.appendChild(ftLabel);

        var ftHelper = document.createElement('p');
        ftHelper.className   = 'freetext-helper';
        ftHelper.textContent = "Anything specific \u2014 \u2018feedback_X belongs in G7 not G1\u2019, \u2018rename G6 to Y\u2019, etc. Leave blank if the bucketing is fine as-is.";
        freetextWrap.appendChild(ftHelper);

        var ftTA = document.createElement('textarea');
        ftTA.id          = 'freetext-overrides';
        ftTA.rows        = 6;
        ftTA.placeholder = 'Optional \u2014 leave blank if the groups read right.';
        ftTA.addEventListener('input', function() {
            if (autosave) autosave.save();
        });
        freetextWrap.appendChild(ftTA);
        container.appendChild(freetextWrap);

        // ============================================================
        // Validation error + Submit
        // ============================================================
        var validationError = document.createElement('div');
        validationError.className = 'validation-error';
        validationError.id        = 'validation-error';
        container.appendChild(validationError);

        var submitWrap = document.createElement('div');
        submitWrap.className = 'submit-wrap';

        var draftSaved = document.createElement('span');
        draftSaved.id        = 'draft-saved-indicator';
        draftSaved.className = 'draft-saved-indicator';
        draftSaved.textContent = '\u2022 Draft saved';
        submitWrap.appendChild(draftSaved);

        var submitBtn = document.createElement('button');
        submitBtn.id        = 'submit-btn';
        submitBtn.className = 'btn-submit';
        submitBtn.setAttribute('type', 'button');
        submitBtn.textContent = 'Send my answers';

        var errorMsg = document.createElement('div');
        errorMsg.className = 'error-message';
        errorMsg.id        = 'error-message';
        errorMsg.innerHTML = 'Something went wrong \u2014 please let us know at <a href="mailto:hello@croquetclaude.com">hello@croquetclaude.com</a>.';

        submitBtn.addEventListener('click', async function() {
            var unanswered = updateValidationState();

            document.querySelectorAll('.card').forEach(function(card) {
                var k = card.dataset.key;
                if (k && answers[k] && answers[k].answer === null) {
                    card.classList.add('missing');
                } else {
                    card.classList.remove('missing');
                }
            });

            if (unanswered.length > 0) {
                var ve = document.getElementById('validation-error');
                ve.textContent = unanswered.length === 1
                    ? 'One card still needs an answer \u2014 it\'s highlighted above.'
                    : unanswered.length + ' cards still need answers \u2014 they\'re highlighted above.';
                ve.classList.add('visible');
                var firstMissing = document.querySelector('.card.missing');
                if (firstMissing) {
                    firstMissing.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                return;
            }

            document.getElementById('validation-error').classList.remove('visible');

            submitBtn.disabled  = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Sending\u2026';

            // Build structured response payload
            var cardPayload = [];

            groups.forEach(function(group, i) {
                var k = keyFor('groups', i);
                cardPayload.push({ section: 'groups', key: group.key, answer: answers[k].answer, notes: answers[k].notes || '' });
            });
            archives.forEach(function(item, i) {
                var k = keyFor('archive', i);
                cardPayload.push({ section: 'archive', key: item.key, answer: answers[k].answer, notes: answers[k].notes || '' });
            });
            collisions.forEach(function(item, i) {
                var k = keyFor('collision', i);
                cardPayload.push({ section: 'collisions', key: item.key, answer: answers[k].answer, notes: answers[k].notes || '' });
            });
            decisions.forEach(function(dec, i) {
                var k = keyFor('decision', i);
                cardPayload.push({ section: 'decisions', key: dec.key, answer: answers[k].answer, notes: answers[k].notes || '' });
            });

            var ftEl = document.getElementById('freetext-overrides');
            var responsePayload = {
                cards: cardPayload,
                freetext_overrides: ftEl ? ftEl.value : ''
            };

            var ok = await window.submitMission(tokenRecord, responsePayload, respondentName);
            if (!ok) {
                submitBtn.disabled    = false;
                submitBtn.textContent = 'Send my answers';
                document.getElementById('error-message').classList.add('visible');
            }
        });

        submitWrap.appendChild(submitBtn);
        submitWrap.appendChild(errorMsg);
        container.appendChild(submitWrap);

        // ---- Mount ----
        app.innerHTML = '';
        app.appendChild(container);

        // ---- Initialise autosave (after mount so freetext-overrides is in DOM) ----
        autosave = window.createAutosave(tokenRecord, buildPayload);

        // ---- Restore draft state into DOM ----
        if (draft && Array.isArray(draft.cards)) {
            draft.cards.forEach(function(entry) {
                var k = entry.key;
                if (!k || entry.answer === null || entry.answer === undefined) return;
                var card = container.querySelector('[data-key="' + k + '"]');
                if (!card) return;

                // Restore button selection
                var btnRow = card.querySelector('.answer-buttons');
                if (btnRow) {
                    var btn = btnRow.querySelector('[data-value="' + entry.answer + '"]');
                    if (btn) {
                        btn.classList.add('selected');
                        card.classList.add('answered');
                        // Restore conditional notes visibility: open if not the first button
                        var firstBtn = btnRow.querySelector('.btn-answer');
                        if (btn !== firstBtn) {
                            var na = card.querySelector('.notes-area');
                            if (na) na.classList.add('visible');
                        }
                    }
                }

                // Restore notes text
                if (entry.notes) {
                    var notesArea = card.querySelector('.notes-area');
                    if (notesArea) {
                        var notesTA = notesArea.querySelector('textarea');
                        if (notesTA) notesTA.value = entry.notes;
                    }
                    var alwaysWrap = card.querySelector('.notes-area-always');
                    if (alwaysWrap) {
                        var alwaysTA = alwaysWrap.querySelector('textarea');
                        if (alwaysTA) alwaysTA.value = entry.notes;
                    }
                }
            });

            // Restore freetext overrides
            if (draft.freetext_overrides && ftTA) {
                ftTA.value = draft.freetext_overrides;
            }

            window.showDraftRestoredNotice(container, tokenRecord.updated);
        }
    };

    // ---- Boot ----
    document.addEventListener('DOMContentLoaded', function() {
        window.initMission();
    });
    </script>
</body>
</html>
