<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lookup stack — three quick calls — CroquetClaude</title>
    <meta name="description" content="Three decisions on the lookup-stack rebuild: QMD embeddings, Perplexica, eval set.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M6 28V18a10 10 0 0120 0v10' fill='none' stroke='%232d6a4f' stroke-width='4' stroke-linecap='round'/></svg>">
    <link rel="stylesheet" href="/styles.css">
    <style>
    /* ---- Mission-specific styles — lookup-stack-2026-04 ---- */

    .q-card .card-name {
        font-size: 1.15rem;
        line-height: 1.35;
        margin-bottom: 0.3rem;
        color: var(--lawn-dark);
    }

    .q-code {
        display: inline-block;
        font-family: 'Courier New', Courier, monospace;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-secondary);
        background: #f5f3ea;
        padding: 0.18rem 0.55rem;
        border-radius: 3px;
        margin-bottom: 0.55rem;
    }

    .q-context {
        font-size: 0.92rem;
        line-height: 1.55;
        color: var(--text-primary);
        margin-bottom: 0.75rem;
    }

    .q-lean {
        font-size: 0.86rem;
        line-height: 1.5;
        color: var(--text-secondary);
        font-style: italic;
        padding: 0.5rem 0.75rem;
        border-left: 3px solid var(--accent-warm);
        background: #fdf5ec;
        margin-bottom: 1rem;
        border-radius: 3px;
    }

    .q-lean strong {
        font-style: normal;
        color: var(--accent-warm-hover);
    }

    /* Option buttons — one per row so the detail text has room */
    .q-options {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
    }

    .q-option-btn {
        font-family: var(--font-body);
        font-size: 0.95rem;
        text-align: left;
        padding: 0.75rem 1rem;
        border: 2px solid var(--border);
        border-radius: var(--radius);
        background: var(--cream);
        color: var(--text-primary);
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease;
        line-height: 1.45;
    }

    .q-option-btn:hover {
        background: #f0f8f4;
        border-color: var(--lawn-green);
    }

    .q-option-btn.selected {
        background: var(--lawn-green);
        border-color: var(--lawn-dark);
        color: var(--white);
    }

    .q-option-btn.selected .q-option-detail {
        color: rgba(255, 255, 255, 0.88);
    }

    .q-option-label {
        display: block;
        font-weight: 700;
        font-size: 1rem;
        margin-bottom: 0.15rem;
    }

    .q-option-detail {
        display: block;
        font-size: 0.86rem;
        color: var(--text-secondary);
        line-height: 1.45;
    }

    /* Comment toggle + area — reuse shared classes */
    .q-comment-toggle {
        display: inline-block;
        margin-top: 0.8rem;
        font-size: 0.82rem;
        color: var(--lawn-green);
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 2px;
        background: none;
        border: none;
        padding: 0;
        font-family: var(--font-body);
    }

    .q-comment-toggle:focus-visible {
        outline: 3px solid var(--lawn-green);
        outline-offset: 2px;
        border-radius: 2px;
    }

    /* Single-column grid — decisions deserve focus, not density */
    .cards-grid {
        grid-template-columns: 1fr;
        max-width: 760px;
    }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="/" class="wordmark">
            <img src="/assets/drawn-claude.png" alt="" class="wordmark-avatar">
            <span>CroquetClaude</span>
        </a>
        <span class="mission-title">Lookup stack — three quick calls</span>
    </header>

    <div id="app">
        <!-- Content injected by app.js + renderMission() -->
    </div>

    <script src="/app.js"></script>
    <script>
    // -----------------------------------------------------------------------
    // Mission — lookup-stack-2026-04
    // -----------------------------------------------------------------------

    window.renderMission = function(tokenRecord) {
        const seed = tokenRecord.payload_seed;
        const respondentName = tokenRecord.respondent_name || 'there';
        const firstName = respondentName.split(' ')[0].split(',')[0];
        const draft = tokenRecord.draft_payload || null;

        const decisions = (seed && seed.sections && seed.sections.decisions) || [];

        // answers keyed by decision id
        const answers = {};
        decisions.forEach(function(d) {
            answers[d.id] = { choice: null, comment: '' };
        });

        // Pre-load from draft
        if (draft && Array.isArray(draft.decisions)) {
            draft.decisions.forEach(function(entry) {
                if (entry.id && answers.hasOwnProperty(entry.id)) {
                    answers[entry.id].choice = entry.choice || null;
                    answers[entry.id].comment = entry.comment || '';
                }
            });
        }

        function unanswered() {
            return decisions.filter(function(d) {
                return answers[d.id].choice === null;
            });
        }

        var autosave = null;

        function buildPayload() {
            return {
                decisions: decisions.map(function(d) {
                    return {
                        id: d.id,
                        choice: answers[d.id].choice,
                        comment: answers[d.id].comment || ''
                    };
                })
            };
        }

        // ---- Build a single question card ----

        function buildCard(decision) {
            const id = decision.id;
            const card = document.createElement('div');
            card.className = 'card q-card';
            card.dataset.key = id;
            card.setAttribute('role', 'group');
            card.setAttribute('aria-label', decision.title);

            // Question code (Q1/Q2/Q3)
            if (decision.code) {
                const codeEl = document.createElement('div');
                codeEl.className = 'q-code';
                codeEl.textContent = decision.code;
                card.appendChild(codeEl);
            }

            // Title
            const nameEl = document.createElement('div');
            nameEl.className = 'card-name';
            nameEl.textContent = decision.title;
            card.appendChild(nameEl);

            // Context paragraph
            const ctxEl = document.createElement('div');
            ctxEl.className = 'q-context';
            ctxEl.textContent = decision.context;
            card.appendChild(ctxEl);

            // Claude's lean
            if (decision.lean) {
                const leanEl = document.createElement('div');
                leanEl.className = 'q-lean';
                leanEl.innerHTML = '<strong>Claude\u2019s lean:</strong> ' + decision.lean;
                card.appendChild(leanEl);
            }

            // Options (single-select)
            const opts = document.createElement('div');
            opts.className = 'q-options';

            (decision.options || []).forEach(function(opt) {
                const b = document.createElement('button');
                b.className = 'q-option-btn';
                b.dataset.value = opt.value;
                b.setAttribute('type', 'button');

                const label = document.createElement('span');
                label.className = 'q-option-label';
                label.textContent = opt.label;
                b.appendChild(label);

                if (opt.detail) {
                    const detail = document.createElement('span');
                    detail.className = 'q-option-detail';
                    detail.textContent = opt.detail;
                    b.appendChild(detail);
                }

                b.addEventListener('click', function() {
                    opts.querySelectorAll('.q-option-btn').forEach(function(x) {
                        x.classList.remove('selected');
                    });
                    b.classList.add('selected');
                    answers[id].choice = opt.value;
                    card.classList.add('answered');
                    card.classList.remove('missing');
                    if (autosave) autosave.save();
                });

                opts.appendChild(b);
            });

            card.appendChild(opts);

            // Comment toggle
            const commentToggle = document.createElement('button');
            commentToggle.className = 'q-comment-toggle';
            commentToggle.setAttribute('type', 'button');
            commentToggle.textContent = 'Add a note (optional)';

            const notesArea = document.createElement('div');
            notesArea.className = 'notes-area';

            const notesTA = document.createElement('textarea');
            notesTA.placeholder = 'Extra context, or a different option you want Claude to consider\u2026';
            notesTA.setAttribute('aria-label', 'Note for ' + decision.title);

            notesTA.addEventListener('input', function() {
                answers[id].comment = notesTA.value;
                if (autosave) autosave.save();
            });

            notesArea.appendChild(notesTA);

            commentToggle.addEventListener('click', function() {
                notesArea.classList.add('visible');
                commentToggle.style.display = 'none';
                notesTA.focus();
            });

            card.appendChild(commentToggle);
            card.appendChild(notesArea);

            return card;
        }

        // ---- Assemble page ----

        const app = document.getElementById('app');
        const container = document.createElement('div');
        container.className = 'container';

        const opener = document.createElement('div');
        opener.className = 'opener';
        opener.innerHTML =
            '<p>Hi ' + firstName + '. Three calls on the lookup-stack rebuild. SearXNG is already live on localhost:8080 (47,800 results on a test query). These three shape what happens next \u2014 embeddings, whether Perplexica earns its keep, and whether we add a fixed eval set so we know the stack actually works rather than just appears to.</p>' +
            '<p>Pick one option per question. My lean is called out on each card so you can just confirm or override.</p>' +
            '<p class="opener-note"><span class="opener-note-icon" aria-hidden="true">\u270e</span> Your answers save automatically. Close the tab and come back any time \u2014 the link picks up where you left off until you press <em>Send my answers</em>.</p>';
        container.appendChild(opener);

        const grid = document.createElement('div');
        grid.className = 'cards-grid';
        decisions.forEach(function(d) {
            grid.appendChild(buildCard(d));
        });
        container.appendChild(grid);

        // Validation error
        const validationError = document.createElement('div');
        validationError.className = 'validation-error';
        validationError.id = 'validation-error';
        container.appendChild(validationError);

        // Submit
        const submitWrap = document.createElement('div');
        submitWrap.className = 'submit-wrap';

        const draftSaved = document.createElement('span');
        draftSaved.id = 'draft-saved-indicator';
        draftSaved.className = 'draft-saved-indicator';
        draftSaved.textContent = '\u2022 Draft saved';
        submitWrap.appendChild(draftSaved);

        const submitBtn = document.createElement('button');
        submitBtn.id = 'submit-btn';
        submitBtn.className = 'btn-submit';
        submitBtn.setAttribute('type', 'button');
        submitBtn.textContent = 'Send my answers';

        const errorMsg = document.createElement('div');
        errorMsg.className = 'error-message';
        errorMsg.id = 'error-message';
        errorMsg.innerHTML = 'Something went wrong \u2014 please let us know at <a href="mailto:hello@croquetclaude.com">hello@croquetclaude.com</a>.';

        submitBtn.addEventListener('click', async function() {
            const missing = unanswered();

            document.querySelectorAll('.card').forEach(function(card) {
                const k = card.dataset.key;
                if (k && answers[k] && answers[k].choice === null) {
                    card.classList.add('missing');
                } else {
                    card.classList.remove('missing');
                }
            });

            if (missing.length > 0) {
                const ve = document.getElementById('validation-error');
                ve.textContent = missing.length === 1
                    ? 'One question still needs an answer \u2014 it\'s highlighted above.'
                    : missing.length + ' questions still need answers \u2014 they\'re highlighted above.';
                ve.classList.add('visible');
                const firstMissing = document.querySelector('.card.missing');
                if (firstMissing) {
                    firstMissing.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                return;
            }

            document.getElementById('validation-error').classList.remove('visible');

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Sending\u2026';

            const responsePayload = buildPayload();
            const ok = await window.submitMission(tokenRecord, responsePayload, respondentName);

            if (!ok) {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send my answers';
                document.getElementById('error-message').classList.add('visible');
            }
        });

        submitWrap.appendChild(submitBtn);
        submitWrap.appendChild(errorMsg);
        container.appendChild(submitWrap);

        app.innerHTML = '';
        app.appendChild(container);

        autosave = window.createAutosave(tokenRecord, buildPayload);

        // Restore draft into rendered DOM
        if (draft && Array.isArray(draft.decisions)) {
            draft.decisions.forEach(function(entry) {
                if (!entry.id) return;
                var card = container.querySelector('[data-key="' + entry.id + '"]');
                if (!card) return;

                if (entry.choice) {
                    var opts = card.querySelector('.q-options');
                    if (opts) {
                        var btn = opts.querySelector('[data-value="' + entry.choice + '"]');
                        if (btn) {
                            btn.classList.add('selected');
                            card.classList.add('answered');
                        }
                    }
                }

                if (entry.comment) {
                    var toggle = card.querySelector('.q-comment-toggle');
                    var notesArea = card.querySelector('.notes-area');
                    var notesTA = notesArea && notesArea.querySelector('textarea');
                    if (notesTA) {
                        notesTA.value = entry.comment;
                        if (notesArea) notesArea.classList.add('visible');
                        if (toggle) toggle.style.display = 'none';
                    }
                }
            });

            window.showDraftRestoredNotice(container, tokenRecord.updated);
        }
    };

    document.addEventListener('DOMContentLoaded', function() {
        window.initMission();
    });
    </script>
</body>
</html>
