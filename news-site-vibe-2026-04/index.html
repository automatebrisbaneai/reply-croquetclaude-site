<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News site direction — CroquetClaude</title>
    <meta name="description" content="Four news-site layouts re-skinned with the CAQ brand. Pick the direction that fits croquet news.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M6 28V18a10 10 0 0120 0v10' fill='none' stroke='%232d6a4f' stroke-width='4' stroke-linecap='round'/></svg>">
    <!-- Reply site shared styles (token gate, expired screen, loading screen) -->
    <link rel="stylesheet" href="/styles.css">
    <!-- Google Fonts from source document -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <style>

/* =====================================================================
   CAQ Brand Tokens — extracted from aims.png + croquet_ideals.png
   ===================================================================== */
:root {
  --qld-maroon:   #73182C;   /* oxblood headline + border */
  --maroon-ink:   #4f1020;   /* darker for deep accents */
  --lawn-green:   #82b25e;   /* flat mid-sat green */
  --lawn-shadow:  #6b9a49;   /* deeper green for rules */
  --cream:        #FCF6DA;   /* warm cream backgrounds */
  --cream-edge:   #f1ead0;   /* slightly darker for cards */
  --ink:          #141414;   /* illustrations + body */
  --ink-soft:     #3a3633;   /* secondary body */
  --ink-mute:     #7a7166;   /* captions / metadata */
  --rule:         #2a1a1c;   /* hairline rules */

  --serif-display: "Abril Fatface", "DM Serif Display", serif;
  --serif-heavy:   "Playfair Display", "DM Serif Display", serif;
  --serif-body:    "Source Serif 4", "EB Garamond", Georgia, serif;
  --serif-mag:     "EB Garamond", Georgia, serif;
  --sans-tab:      "Oswald", "Source Sans Pro", sans-serif;
}

/* =====================================================================
   Base
   ===================================================================== */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: #e9e2c7;
  color: var(--ink);
  font-family: var(--serif-body);
  font-size: 17px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

img { max-width: 100%; display: block; }

a { color: inherit; text-decoration: none; }

/* =====================================================================
   Page frame
   ===================================================================== */
.page {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0;
  background: var(--cream);
  box-shadow: 0 0 60px rgba(20,20,20,.08);
}

.doc-intro {
  padding: 64px 72px 40px;
  border-bottom: 2px solid var(--rule);
}
.doc-intro .eyebrow {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .22em;
  font-size: 12px;
  color: var(--qld-maroon);
  font-weight: 600;
}
.doc-intro h1 {
  font-family: var(--serif-display);
  font-size: clamp(48px, 6vw, 84px);
  line-height: .95;
  color: var(--qld-maroon);
  margin: 14px 0 18px;
  letter-spacing: -.01em;
}
.doc-intro .deck {
  font-family: var(--serif-mag);
  font-style: italic;
  font-size: 22px;
  line-height: 1.4;
  color: var(--ink-soft);
  max-width: 760px;
  margin: 0;
}

/* =====================================================================
   Header band — brand anchor
   ===================================================================== */
.brand-band {
  padding: 56px 72px 72px;
  border-bottom: 14px solid var(--qld-maroon);
  background: var(--cream);
}
.brand-band .label {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .3em;
  font-size: 11px;
  color: var(--ink-mute);
  margin-bottom: 8px;
}
.brand-band h2 {
  font-family: var(--serif-display);
  font-size: 40px;
  line-height: 1;
  color: var(--qld-maroon);
  margin: 0 0 8px;
}
.brand-band .note {
  font-family: var(--serif-mag);
  font-style: italic;
  font-size: 19px;
  color: var(--ink-soft);
  max-width: 720px;
  margin: 0 0 36px;
}
.posters {
  display: grid;
  grid-template-columns: 1fr 1.6fr;
  gap: 28px;
  align-items: start;
}
.posters figure { margin: 0; }
.posters img {
  width: 100%;
  height: auto;
  display: block;
  border: 1px solid var(--rule);
  box-shadow: 8px 8px 0 var(--qld-maroon);
}
.posters figcaption {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .22em;
  font-size: 10px;
  color: var(--ink-mute);
  margin-top: 10px;
}

.tokens {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.swatch {
  border: 1px solid var(--rule);
  padding: 18px 16px;
  background: var(--cream-edge);
  min-height: 110px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.swatch .chip {
  width: 56px; height: 56px;
  border: 1px solid var(--rule);
}
.swatch .name {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .18em;
  font-size: 11px;
  color: var(--ink-mute);
  margin-top: 8px;
}
.swatch .hex {
  font-family: "Courier New", monospace;
  font-size: 13px;
  color: var(--ink);
}

/* =====================================================================
   Section wrappers (one per re-skinned site)
   ===================================================================== */
.skin-section {
  padding: 72px 0 56px;
  border-top: 2px solid var(--rule);
  background: var(--cream);
}
.skin-intro {
  padding: 0 72px 36px;
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 48px;
  align-items: end;
}
.skin-intro .meta .num {
  font-family: var(--serif-display);
  font-size: 120px;
  line-height: .85;
  color: var(--qld-maroon);
  margin: 0;
}
.skin-intro .meta .source {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .24em;
  font-size: 11px;
  color: var(--ink-mute);
  margin-top: 4px;
}
.skin-intro h3 {
  font-family: var(--serif-display);
  font-size: 46px;
  line-height: 1;
  color: var(--qld-maroon);
  margin: 0 0 14px;
}
.skin-intro .oneliner {
  font-family: var(--serif-mag);
  font-style: italic;
  font-size: 22px;
  line-height: 1.35;
  color: var(--ink-soft);
  margin: 0;
}

.skin-notes {
  padding: 32px 72px 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  font-family: var(--serif-body);
  font-size: 15.5px;
  line-height: 1.6;
}
.skin-notes p { margin: 0; }
.skin-notes strong {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .22em;
  font-size: 11px;
  color: var(--qld-maroon);
  display: block;
  margin-bottom: 6px;
}

/* Mockup shell — each one sits in a framed viewport */
.mock {
  margin: 40px 24px 0;
  border: 1px solid var(--rule);
  background: #fff;
  box-shadow: 12px 12px 0 var(--qld-maroon);
  overflow: hidden;
}

/* =====================================================================
   SHARED INK ILLUSTRATION (SVG) — reused, colour-tinted per skin
   ===================================================================== */
.ink-hero svg { display: block; width: 100%; height: auto; }

/* SVG fills container (responsive preserveAspectRatio meet means letterbox).
   For SVGs with cream sky (handshake, lawn), the outer container needs a
   cream background so letterbox bars match the sky rather than clashing. */
.art.has-cream-sky, .ph.has-cream-sky, .frame.has-cream-sky {
  background: var(--cream) !important;
}

/* =====================================================================
   SKIN 1 — REASONS TO BE CHEERFUL (card curation, moderate density)
   ===================================================================== */
.skin-cheerful {
  font-family: var(--serif-body);
  background: var(--cream);
  color: var(--ink);
  padding: 0 0 48px;
}
.sc-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 48px;
  border-bottom: 1px solid var(--rule);
}
.sc-nav .brand {
  font-family: var(--serif-display);
  font-size: 30px;
  color: var(--qld-maroon);
  letter-spacing: -.01em;
}
.sc-nav .brand span { font-style: italic; }
.sc-nav ul {
  list-style: none; display: flex; gap: 28px; padding: 0; margin: 0;
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .22em;
  font-size: 11px;
}
.sc-nav .join {
  background: var(--qld-maroon);
  color: var(--cream);
  padding: 10px 18px;
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .22em;
  font-size: 11px;
}

.sc-tagline {
  text-align: center;
  padding: 28px 48px 8px;
  font-family: var(--serif-mag);
  font-style: italic;
  font-size: 20px;
  color: var(--ink-soft);
  border-bottom: 1px solid var(--rule);
}

.sc-hero {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 0;
  border-bottom: 1px solid var(--rule);
}
.sc-hero .art { background: var(--lawn-green); padding: 24px 24px 0; }
.sc-hero .copy {
  padding: 56px 48px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: var(--cream);
}
.sc-hero .tag {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .28em;
  font-size: 11px;
  color: var(--qld-maroon);
  margin-bottom: 16px;
}
.sc-hero h1 {
  font-family: var(--serif-display);
  font-size: clamp(40px, 4vw, 56px);
  line-height: 1;
  color: var(--qld-maroon);
  margin: 0 0 18px;
  letter-spacing: -.01em;
}
.sc-hero .dek {
  font-family: var(--serif-mag);
  font-style: italic;
  font-size: 19px;
  color: var(--ink-soft);
  line-height: 1.45;
  margin: 0 0 22px;
}
.sc-hero .byline {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .22em;
  font-size: 11px;
  color: var(--ink-mute);
}

.sc-section-head {
  padding: 40px 48px 16px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  border-top: 1px solid var(--rule);
}
.sc-section-head h2 {
  font-family: var(--serif-display);
  font-size: 34px;
  color: var(--qld-maroon);
  margin: 0;
}
.sc-section-head a {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .22em;
  font-size: 11px;
  color: var(--ink-mute);
}

.sc-cards {
  padding: 0 48px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px;
}
.sc-card .ph {
  background: var(--lawn-green);
  aspect-ratio: 3 / 2;
  border: 1px solid var(--rule);
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}
.sc-card .ph svg { width: 100%; height: 100%; }
.sc-card .tag {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .22em;
  font-size: 10px;
  color: var(--qld-maroon);
  margin-bottom: 6px;
}
.sc-card h3 {
  font-family: var(--serif-heavy);
  font-weight: 900;
  font-size: 22px;
  line-height: 1.15;
  margin: 0 0 8px;
  color: var(--ink);
}
.sc-card .meta {
  font-family: var(--serif-mag);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-mute);
}

.sc-collection {
  margin: 48px 48px 0;
  padding: 36px 36px;
  background: var(--qld-maroon);
  color: var(--cream);
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 36px;
  align-items: center;
}
.sc-collection h2 {
  font-family: var(--serif-display);
  font-size: 42px;
  line-height: 1;
  margin: 0;
  color: var(--cream);
}
.sc-collection .label {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .28em;
  font-size: 11px;
  color: var(--lawn-green);
  margin-bottom: 10px;
}
.sc-collection p {
  font-family: var(--serif-mag);
  font-style: italic;
  font-size: 17px;
  line-height: 1.5;
  margin: 0 0 14px;
  color: var(--cream);
}
.sc-collection a {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .22em;
  font-size: 11px;
  color: var(--cream);
  border-bottom: 1px solid var(--cream);
  padding-bottom: 2px;
}

/* =====================================================================
   SKIN 2 — BITTER SOUTHERNER (long single-column, full-bleed lyric)
   ===================================================================== */
.skin-bs {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--serif-body);
  padding: 0 0 64px;
}
.bs-nav {
  border-bottom: 1px solid var(--rule);
  padding: 28px 72px 22px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 24px;
}
.bs-nav .left ul, .bs-nav .right ul {
  list-style: none; padding: 0; margin: 0;
  display: flex; gap: 22px;
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .2em;
  font-size: 10.5px;
  color: var(--ink-soft);
}
.bs-nav .right ul { justify-content: flex-end; }
.bs-nav .mast {
  font-family: var(--serif-display);
  font-size: 34px;
  text-align: center;
  color: var(--qld-maroon);
  letter-spacing: -.01em;
  line-height: 1;
}
.bs-nav .mast small {
  display: block;
  font-family: var(--sans-tab);
  font-size: 10px;
  letter-spacing: .4em;
  color: var(--ink-mute);
  margin-top: 6px;
  font-style: normal;
  font-weight: 600;
}

.bs-feature {
  padding: 72px 72px 56px;
}
.bs-feature .date {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .28em;
  font-size: 11px;
  color: var(--ink-mute);
  margin-bottom: 18px;
}
.bs-feature h1 {
  font-family: var(--serif-display);
  font-size: clamp(54px, 6vw, 88px);
  line-height: .92;
  color: var(--qld-maroon);
  margin: 0 0 22px;
  letter-spacing: -.01em;
  max-width: 16ch;
}
.bs-feature .subhead {
  font-family: var(--serif-mag);
  font-style: italic;
  font-size: 22px;
  line-height: 1.45;
  color: var(--ink-soft);
  max-width: 620px;
  margin: 0 0 28px;
}
.bs-feature .byline {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .22em;
  font-size: 11px;
  color: var(--ink-mute);
}

.bs-hero-art {
  padding: 0 72px;
}
.bs-hero-art .frame {
  background: var(--lawn-green);
  border: 1px solid var(--rule);
  aspect-ratio: 16 / 9;
  overflow: hidden;
}
.bs-hero-art .frame svg { width: 100%; height: 100%; }
.bs-hero-art .caption {
  font-family: var(--serif-mag);
  font-style: italic;
  font-size: 14px;
  color: var(--ink-mute);
  margin-top: 10px;
  max-width: 620px;
}

.bs-intro-mission {
  padding: 80px 72px 64px;
  text-align: center;
  max-width: 900px;
  margin: 0 auto;
}
.bs-intro-mission .mark {
  font-family: var(--serif-display);
  color: var(--qld-maroon);
  font-size: 56px;
  line-height: 1;
  margin-bottom: 10px;
}
.bs-intro-mission p {
  font-family: var(--serif-mag);
  font-size: 22px;
  line-height: 1.55;
  color: var(--ink-soft);
  font-style: italic;
  margin: 0;
}

.bs-stack {
  padding: 0 72px;
  border-top: 1px solid var(--rule);
}
.bs-stack .entry {
  padding: 56px 0;
  border-bottom: 1px solid var(--rule);
  display: grid;
  grid-template-columns: 1.3fr 1fr;
  gap: 56px;
  align-items: center;
}
.bs-stack .entry:nth-child(even) {
  grid-template-columns: 1fr 1.3fr;
}
.bs-stack .entry:nth-child(even) .text { order: 2; }
.bs-stack .entry:nth-child(even) .art  { order: 1; }
.bs-stack .art {
  background: var(--lawn-green);
  border: 1px solid var(--rule);
  aspect-ratio: 5 / 4;
  overflow: hidden;
}
.bs-stack .art svg { width: 100%; height: 100%; }
.bs-stack .date {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .28em;
  font-size: 11px;
  color: var(--ink-mute);
  margin-bottom: 14px;
}
.bs-stack h2 {
  font-family: var(--serif-display);
  font-size: clamp(32px, 3.4vw, 46px);
  line-height: .98;
  color: var(--qld-maroon);
  margin: 0 0 16px;
  letter-spacing: -.005em;
}
.bs-stack .dek {
  font-family: var(--serif-mag);
  font-style: italic;
  font-size: 18px;
  line-height: 1.45;
  color: var(--ink-soft);
  margin: 0 0 14px;
}
.bs-stack .byline {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .22em;
  font-size: 11px;
  color: var(--ink-mute);
}

/* =====================================================================
   SKIN 3 — DEFECTOR (magazine grid, opinionated voice, comment counts)
   ===================================================================== */
.skin-defector {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--serif-body);
  padding: 0 0 56px;
}
.df-top {
  background: var(--qld-maroon);
  color: var(--cream);
  padding: 14px 48px;
  display: flex;
  justify-content: space-between;
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .22em;
  font-size: 10.5px;
}
.df-mast {
  padding: 28px 48px 20px;
  border-bottom: 3px solid var(--qld-maroon);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 24px;
}
.df-mast .left, .df-mast .right {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .22em;
  font-size: 11px;
  color: var(--ink-mute);
}
.df-mast .right { text-align: right; }
.df-mast .name {
  font-family: var(--serif-display);
  font-size: 46px;
  line-height: 1;
  color: var(--qld-maroon);
  text-align: center;
  letter-spacing: -.01em;
}
.df-mast .name small {
  display: block;
  font-family: var(--serif-mag);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-mute);
  margin-top: 4px;
  letter-spacing: 0;
  text-transform: none;
  font-weight: 400;
}
.df-catbar {
  padding: 12px 48px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  gap: 26px;
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .22em;
  font-size: 11px;
  color: var(--ink-soft);
  overflow-x: auto;
}

.df-lead {
  padding: 48px 48px 40px;
  border-bottom: 1px solid var(--rule);
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 48px;
}
.df-lead .art {
  background: var(--lawn-green);
  border: 1px solid var(--rule);
  aspect-ratio: 4 / 3;
  overflow: hidden;
}
.df-lead .art svg { width: 100%; height: 100%; }
.df-lead .copy { display: flex; flex-direction: column; justify-content: center; }
.df-lead .tag {
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .28em;
  font-size: 11px;
  color: var(--qld-maroon);
  margin-bottom: 14px;
}
.df-lead h1 {
  font-family: var(--serif-display);
  font-size: clamp(40px, 4.2vw, 58px);
  line-height: .98;
  color: var(--qld-maroon);
  margin: 0 0 18px;
  letter-spacing: -.01em;
}
.df-lead .dek {
  font-family: var(--serif-mag);
  font-style: italic;
  font-size: 19px;
  line-height: 1.45;
  color: var(--ink-soft);
  margin: 0 0 20px;
}
.df-lead .meta {
  display: flex; align-items: center; gap: 14px;
  font-family: var(--sans-tab);
  text-transform: uppercase;
  letter-spacing: .2em;
  font-size: 11px;
  color: var(--ink-mute);
}
.df-lead .meta .avatar {
  width: 32px; height: 32px;
  background: var(--lawn-green);
  border: 1px solid var(--rule);
  border-radius: 50%;
  overflow: hidden;
}
.df-lead .meta .avatar svg { width: 100%; height: 100%; }
.df-lead .comments {
  margin-left: auto;
  background: var(--qld-maroon);
  color: var(--cream);
  padding: 6px 10px;
  font-size: 10.5px;

    <script>
    // -----------------------------------------------------------------------

    // -----------------------------------------------------------------------

    window.renderMission = function(tokenRecord) {
        var app = document.getElementById('app');

        // ---- Inject the full Designer-Claude comparison document ----
        app.innerHTML = SOURCE_HTML + DECISION_PANEL_HTML;

        // ---- Wire the decision panel ----
        var form = document.getElementById('decision-form');
        var options = form.querySelectorAll('.pick-option');
        var radioInputs = form.querySelectorAll('input[type="radio"]');
        var notesTA = document.getElementById('panel-notes');
        var submitBtn = document.getElementById('panel-submit-btn');
        var validationEl = document.getElementById('panel-validation-error');
        var errorEl = document.getElementById('panel-error-msg');
        var thankyouEl = document.getElementById('panel-thankyou');
        var formEl = document.getElementById('panel-form-fields');

        // Highlight selected option label when radio changes
        radioInputs.forEach(function(radio) {
            radio.addEventListener('change', function() {
                options.forEach(function(opt) { opt.classList.remove('selected'); });
                var parent = radio.closest('.pick-option');
                if (parent) parent.classList.add('selected');
                validationEl.classList.remove('visible');
            });
        });

        // Also handle click on the label container
        options.forEach(function(opt) {
            opt.addEventListener('click', function() {
                var radio = opt.querySelector('input[type="radio"]');
                if (radio) {
                    radio.checked = true;
                    radio.dispatchEvent(new Event('change'));
                }
            });
        });

        submitBtn.addEventListener('click', async function() {
            // Validate: a pick is required
            var picked = form.querySelector('input[type="radio"]:checked');
            if (!picked) {
                validationEl.classList.add('visible');
                validationEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }

            validationEl.classList.remove('visible');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending\u2026';

            var responsePayload = {

            };

    // Confetti spawner — 60 pieces, random drift + delay
    function spawnConfetti(container) {
        var classes = ['c1','c2','c3','c4'];
        for (var i = 0; i < 60; i++) {
            var piece = document.createElement('span');
            piece.className = 'cc-confetti ' + classes[i % 4];
            piece.style.left = (Math.random() * 100) + '%';
            piece.style.animationDelay = (Math.random() * 600) + 'ms';
            piece.style.animationDuration = (1800 + Math.random() * 1200) + 'ms';
            piece.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
            container.appendChild(piece);
        }
        setTimeout(function() {
            container.querySelectorAll('.cc-confetti').forEach(function(p) { p.remove(); });
        }, 3500);
    }

        var PB_BASE = 'https://pb.croquetwade.com';

        var TOKENS_COLLECTION = 'reply_mission_tokens';

        var postBody = JSON.stringify({
            token: tokenRecord.token,
            mission: tokenRecord.mission,
            payload: responsePayload,
            user_agent: navigator.userAgent,
            submitted_at: new Date().toISOString()
        });

        var postOk = false;
        try {
            var res = await fetch(PB_BASE + '/api/collections/' + RESPONSES_COLLECTION + '/records', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: postBody
            });
            postOk = res.ok;
        } catch(e) {
            postOk = false;
        }

        if (!postOk) return false;

        // 2. PATCH the token to mark as submitted
        try {
            await fetch(PB_BASE + '/api/collections/' + TOKENS_COLLECTION + '/records/' + tokenRecord.id, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ submitted_at: new Date().toISOString() })
            });
        } catch(e) { /* best-effort */ }

        return true;
