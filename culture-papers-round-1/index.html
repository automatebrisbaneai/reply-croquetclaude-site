<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A letter, in six questions — CroquetClaude</title>
    <meta name="description" content="A letter from CroquetClaude on winning team cultures in croquet — six questions for Marilyn Nelson.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><line x1='16' y1='4' x2='16' y2='28' stroke='%2373182C' stroke-width='2.5' stroke-linecap='round'/><line x1='4' y1='16' x2='28' y2='16' stroke='%2373182C' stroke-width='2.5' stroke-linecap='round'/><line x1='7.5' y1='7.5' x2='24.5' y2='24.5' stroke='%2373182C' stroke-width='2.5' stroke-linecap='round'/><line x1='24.5' y1='7.5' x2='7.5' y2='24.5' stroke='%2373182C' stroke-width='2.5' stroke-linecap='round'/><line x1='4' y1='10' x2='28' y2='22' stroke='%2373182C' stroke-width='2.5' stroke-linecap='round'/><line x1='4' y1='22' x2='28' y2='10' stroke='%2373182C' stroke-width='2.5' stroke-linecap='round'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        /* ---------------------------------------------------------------
           culture-papers-round-1 — per-mission styles
           DO NOT touch app.js or styles.css — only this block.
        --------------------------------------------------------------- */

        :root {
            --font-serif: 'Fraunces', 'Iowan Old Style', Georgia, serif;
            --font-sans: 'Atkinson Hyperlegible', 'Inter', system-ui, sans-serif;
            --color-page: #FAF9F6;
            --color-card: #FFFFFF;
            --color-border: #EBE8E1;
            --color-green: #2D6A4F;
            --color-terracotta: #BC6C25;
            --color-ink: #1C1916;
            --color-preamble: #4A453D;
            --color-muted: #7A7268;
            --color-hover-bg: #FAF9F6;
            --color-hover-border: #C9C3B6;
            --color-choice-border: #E0DCD3;
            --color-opener: #2D2822;
        }

        body {
            background: var(--color-page);
            font-family: var(--font-sans);
            color: var(--color-ink);
            margin: 0;
            padding: 0;
        }

        .site-header {
            display: none;
        }

        /* ---- Layout ---- */
        .cp-column {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 24px;
            box-sizing: border-box;
        }

        /* ---- Hero letterhead ---- */
        .hero-band {
            width: 100%;
            padding: 64px 0 48px;
            background: var(--color-page);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-letterhead {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .hero-asterisk-icon {
            display: block;
            opacity: 0;
            animation: heroFadeIn 0.5s ease-out 0.15s forwards;
        }

        .hero-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            opacity: 0;
            animation: heroFadeIn 0.5s ease-out 0.15s forwards;
        }

        .hero-sender {
            font-family: var(--font-serif);
            font-size: clamp(1.7rem, 4vw, 2.2rem);
            font-weight: 500;
            color: var(--color-ink);
            letter-spacing: -0.01em;
            line-height: 1.15;
            opacity: 0;
            animation: heroFadeIn 0.5s ease-out 0.45s forwards;
        }

        .hero-meta {
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 400;
            color: var(--color-muted);
            letter-spacing: 0.02em;
            opacity: 0;
            animation: heroFadeIn 0.5s ease-out 0.8s forwards;
        }

        @keyframes heroFadeIn {
            to { opacity: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            .hero-asterisk-icon,
            .hero-sender,
            .hero-meta {
                animation: none;
                opacity: 1;
            }
        }

        /* ---- Opener ---- */
        .cp-opener {
            margin-top: 48px;
            font-family: var(--font-serif);
            font-size: 19px;
            line-height: 1.7;
            color: var(--color-opener);
        }

        /* ---- Cards ---- */
        .cp-cards {
            margin-top: 80px;
            display: flex;
            flex-direction: column;
            gap: 56px;
        }

        .question-card {
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(30, 24, 15, 0.04), 0 4px 14px rgba(30, 24, 15, 0.03);
        }

        /* Full-width card image banner */
        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            filter: saturate(0.82) contrast(0.96);
            display: block;
        }

        /* Card body padding (separate from image) */
        .card-body {
            padding: 28px 36px 32px;
        }

        /* Card 6 asterisk */
        .card-asterisk {
            width: 32px;
            height: 32px;
            display: block;
            margin-bottom: 20px;
        }

        .card-preamble {
            font-family: var(--font-serif);
            font-size: 17px;
            line-height: 1.65;
            color: var(--color-preamble);
            margin: 0 0 24px 0;
        }

        .card-instruction {
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 700;
            color: var(--color-green);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin: 0 0 16px 0;
        }

        .card-rule {
            border: none;
            border-top: 1px solid var(--color-border);
            width: 48px;
            margin: 0 0 32px 0;
        }

        .card-question {
            font-family: var(--font-sans);
            font-size: 18px;
            font-weight: 500;
            color: var(--color-ink);
            line-height: 1.45;
            margin: 0 0 24px 0;
        }

        /* ---- Choice buttons ---- */
        .choice-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }

        .choice-btn {
            background: #FFFFFF;
            border: 1px solid var(--color-choice-border);
            border-radius: 10px;
            padding: 14px 20px;
            font-family: var(--font-sans);
            font-size: 15px;
            font-weight: 500;
            color: var(--color-opener);
            min-height: 48px;
            cursor: pointer;
            transition: border-color 0.18s ease-out, background 0.18s ease-out, color 0.18s ease-out, box-shadow 0.18s ease-out;
            text-align: left;
            line-height: 1.3;
        }

        .choice-btn:hover {
            border-color: var(--color-hover-border);
            background: var(--color-hover-bg);
        }

        .choice-btn.selected {
            background: var(--color-green);
            border-color: var(--color-green);
            color: #FFFFFF;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .choice-btn:focus-visible {
            outline: 2px solid var(--color-green);
            outline-offset: 2px;
        }

        /* ---- Voice textarea ---- */
        .voice-label {
            display: block;
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 500;
            color: var(--color-muted);
            letter-spacing: 0.01em;
            margin-bottom: 4px;
        }

        .voice-textarea {
            width: 100%;
            min-height: 96px;
            background: var(--color-page);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            padding: 16px 56px 16px 20px;
            font-family: var(--font-serif);
            font-size: 16px;
            line-height: 1.55;
            color: var(--color-opener);
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.18s ease-out, background 0.18s ease-out;
            outline: none;
        }

        .voice-textarea:focus {
            border-color: var(--color-hover-border);
            background: #FFFFFF;
        }

        /* ---- Submit ---- */
        .cp-submit {
            margin-top: 96px;
            text-align: center;
        }

        .cp-submit-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .btn-submit-cp {
            background: var(--color-green);
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            padding: 16px 28px;
            font-family: var(--font-sans);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            min-width: 280px;
            transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
            letter-spacing: 0.01em;
        }

        .btn-submit-cp:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(115, 24, 44, 0.22);
        }

        .btn-submit-cp:focus-visible {
            outline: 2px solid var(--color-green);
            outline-offset: 3px;
        }

        .btn-submit-cp:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .cp-error-msg {
            display: none;
            font-family: var(--font-sans);
            font-size: 14px;
            color: var(--color-green);
        }

        .cp-error-msg.visible {
            display: block;
        }

        .draft-saved-indicator {
            font-family: var(--font-sans);
            font-size: 13px;
            color: var(--color-muted);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .draft-saved-indicator.visible {
            opacity: 1;
        }

        .draft-restored-notice {
            font-family: var(--font-sans);
            font-size: 13px;
            color: var(--color-muted);
            background: #F3F1EC;
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 24px;
        }

        /* ---- Footer ---- */
        .cp-footer {
            margin-top: 64px;
            padding-bottom: 48px;
            text-align: center;
            font-family: var(--font-sans);
            font-size: 13px;
            color: #9A9389;
            line-height: 1.6;
        }

        .cp-footer a {
            color: #9A9389;
            text-decoration: underline;
            text-decoration-color: #C9C3B6;
        }

        /* ---- Spinner ---- */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ---- Mobile ---- */
        @media (max-width: 720px) {
            .hero-band {
                padding: 48px 0 36px;
            }

            .card-img {
                height: 140px;
            }

            .card-body {
                padding: 22px 24px 26px;
            }

            .cp-opener {
                font-size: 18px;
            }

            .voice-textarea {
                min-height: 80px;
            }

            .btn-submit-cp {
                width: 100%;
                min-width: unset;
            }

            .choice-buttons {
                flex-direction: column;
            }

            .choice-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Hero — CroquetClaude letterhead -->
    <div class="hero-band" role="banner">
        <div class="hero-letterhead">
            <img src="/images/drawn-claude.png" alt="CroquetClaude" class="hero-avatar">
            <div class="hero-sender">CroquetClaude</div>
            <div class="hero-meta">Six questions &middot; Round 1</div>
        </div>
    </div>

    <div id="app">
        <div class="cp-column">
            <div class="loading-screen">Loading your letter&hellip;</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <script src="/shared/voice-to-text.js"></script>
    <script src="/app.js"></script>
    <script>
    // -----------------------------------------------------------------------
    // Mission — culture-papers-round-1
    // -----------------------------------------------------------------------

    window.renderMission = function(tokenRecord) {
        var respondentName = tokenRecord.respondent_name || 'there';
        var firstName = respondentName.split(' ')[0].split(',')[0];
        var draft = tokenRecord.draft_payload || null;

        var state = {
            q1_choice: null,
            q4_choice: null,
            q1_voice: '',
            q2_voice: '',
            q3_voice: '',
            q4_voice: '',
            q5_voice: '',
            q6_voice: ''
        };

        if (draft) {
            if (draft.q1_choice !== undefined) state.q1_choice = draft.q1_choice;
            if (draft.q4_choice !== undefined) state.q4_choice = draft.q4_choice;
            if (draft.q1_voice !== undefined) state.q1_voice = draft.q1_voice;
            if (draft.q2_voice !== undefined) state.q2_voice = draft.q2_voice;
            if (draft.q3_voice !== undefined) state.q3_voice = draft.q3_voice;
            if (draft.q4_voice !== undefined) state.q4_voice = draft.q4_voice;
            if (draft.q5_voice !== undefined) state.q5_voice = draft.q5_voice;
            if (draft.q6_voice !== undefined) state.q6_voice = draft.q6_voice;
        }

        var autosave = null;

        function buildPayload() {
            return {
                q1_choice: state.q1_choice,
                q4_choice: state.q4_choice,
                q1_voice: state.q1_voice,
                q2_voice: state.q2_voice,
                q3_voice: state.q3_voice,
                q4_voice: state.q4_voice,
                q5_voice: state.q5_voice,
                q6_voice: state.q6_voice
            };
        }

        function makeChoiceButtons(options, stateKey) {
            var wrap = document.createElement('div');
            wrap.className = 'choice-buttons';
            wrap.setAttribute('role', 'group');

            options.forEach(function(opt) {
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'choice-btn';
                btn.textContent = opt;
                btn.setAttribute('data-value', opt);

                if (state[stateKey] === opt) {
                    btn.classList.add('selected');
                }

                btn.addEventListener('click', function() {
                    wrap.querySelectorAll('.choice-btn').forEach(function(b) {
                        b.classList.remove('selected');
                    });
                    btn.classList.add('selected');
                    state[stateKey] = opt;
                    if (autosave) autosave.save();
                });

                wrap.appendChild(btn);
            });

            return wrap;
        }

        function makeVoiceTextarea(stateKey, placeholder, labelText) {
            var container = document.createElement('div');

            var label = document.createElement('label');
            label.className = 'voice-label';
            label.textContent = labelText || 'Add a thought (or hold the mic to speak)';
            container.appendChild(label);

            var ta = document.createElement('textarea');
            ta.className = 'voice-textarea';
            ta.setAttribute('rows', '4');
            if (placeholder) ta.placeholder = placeholder;
            ta.value = state[stateKey] || '';

            ta.addEventListener('input', function() {
                state[stateKey] = ta.value;
                if (autosave) autosave.save();
            });

            container.appendChild(ta);

            // Wire shared voice module after ta is in the DOM.
            // cleanUrl points at talk.cw — cross-origin cleanup via CORSMiddleware in voice-transcribe.
            if (window.VoiceToText) {
                window.VoiceToText.init({ target: ta, cleanUrl: 'https://talk.croquetwade.com/clean' });
            }

            return { container: container, textarea: ta };
        }

        function makeCard(opts) {
            var card = document.createElement('div');
            card.className = 'question-card';

            // Full-width image banner (no asterisk support at top — asterisk goes inside card-body)
            if (opts.imgSrc) {
                var img = document.createElement('img');
                img.src = opts.imgSrc;
                img.alt = opts.imgAlt || '';
                img.className = 'card-img';
                img.loading = 'lazy';
                card.appendChild(img);
            }

            // Card body
            var body = document.createElement('div');
            body.className = 'card-body';

            if (opts.useAsterisk) {
                var asterisk = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                asterisk.setAttribute('viewBox', '0 0 32 32');
                asterisk.setAttribute('width', '32');
                asterisk.setAttribute('height', '32');
                asterisk.className = 'card-asterisk';
                asterisk.setAttribute('aria-hidden', 'true');
                var lines = [
                    [16, 4, 16, 28],
                    [4, 16, 28, 16],
                    [7.5, 7.5, 24.5, 24.5],
                    [24.5, 7.5, 7.5, 24.5],
                    [4, 10, 28, 22],
                    [4, 22, 28, 10]
                ];
                lines.forEach(function(coords) {
                    var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', coords[0]);
                    line.setAttribute('y1', coords[1]);
                    line.setAttribute('x2', coords[2]);
                    line.setAttribute('y2', coords[3]);
                    line.setAttribute('stroke', '#BC6C25');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('stroke-linecap', 'round');
                    asterisk.appendChild(line);
                });
                body.appendChild(asterisk);
            }

            if (opts.preamble) {
                var preamble = document.createElement('p');
                preamble.className = 'card-preamble';
                preamble.textContent = opts.preamble;
                body.appendChild(preamble);
            }

            if (opts.instruction) {
                var instruction = document.createElement('p');
                instruction.className = 'card-instruction';
                instruction.textContent = opts.instruction;
                body.appendChild(instruction);
            }

            var rule = document.createElement('hr');
            rule.className = 'card-rule';
            body.appendChild(rule);

            var question = document.createElement('p');
            question.className = 'card-question';
            question.textContent = opts.question;
            body.appendChild(question);

            if (opts.choiceOptions && opts.choiceStateKey) {
                body.appendChild(makeChoiceButtons(opts.choiceOptions, opts.choiceStateKey));
            }

            if (opts.voiceStateKey) {
                var voiceResult = makeVoiceTextarea(opts.voiceStateKey, opts.voicePlaceholder);
                body.appendChild(voiceResult.container);
                // VoiceToText.init() is called inside makeVoiceTextarea — no extra wiring needed.
            }

            card.appendChild(body);
            return card;
        }

        // ---- Build the page ----
        var app = document.getElementById('app');
        var column = document.createElement('div');
        column.className = 'cp-column';

        // Draft restored notice anchor
        var noticeAnchor = document.createElement('div');
        noticeAnchor.id = 'draft-notice-anchor';
        column.appendChild(noticeAnchor);

        // Opener
        var opener = document.createElement('p');
        opener.className = 'cp-opener';
        opener.textContent = firstName + ', I\u2019ve been reading up on how other sports build winning cultures without making the game miserable. The same patterns show up in rugby league, the All Blacks, cycling. What I don\u2019t have is the croquet version, and no book is going to give me that. These six questions are me asking you for it. How the clubs get on with each other, what signals are loudest, who\u2019s already doing it well. No right answers. I want what you know.';
        column.appendChild(opener);

        // Cards
        var cardsEl = document.createElement('div');
        cardsEl.className = 'cp-cards';

        // Card 1 — Big frame
        cardsEl.appendChild(makeCard({
            imgSrc: 'images/card-1-meninga.jpg',
            imgAlt: 'Mal Meninga, Queensland State of Origin coach',
            preamble: 'Queensland rugby league pulls this off every June. Broncos players who\u2019ve spent the season knocking each other about turn up as Maroons and play for each other. Under Meninga, Queensland won Origin almost every year. Personal rivalries left at the door, state identity switched on, senior players looking after the younger ones. The same pattern shows up in the research. Hold a clear standard, reward effort over results, and pick players on character as well as form. The wins follow.',
            instruction: 'So here\u2019s my question',
            question: 'Does that shape fit what you\u2019d want from a state-level team culture, or is something off for your world?',
            voiceStateKey: 'q1_voice'
        }));

        // Card 2 — Coopetition
        cardsEl.appendChild(makeCard({
            imgSrc: 'images/card-2-coopetition.jpg',
            imgAlt: 'Queensland Maroons State of Origin',
            preamble: 'The Maroons thing only works because something earlier is already working. Personal rivals through the NRL season, genuine teammates in June. Players who treat their opponents well during the year can pull the jersey on and mean it. Players who don\u2019t, can\u2019t. How players get on with each other during competition either makes the rep side possible or kills it before anyone turns up in June.',
            instruction: 'So here\u2019s my question',
            question: 'Does a dynamic like that exist in your world? If yes, what does it look like in practice. If no, what does the cross-player picture look like today?',
            voiceStateKey: 'q2_voice'
        }));

        // Card 3 — Loudest artefact
        cardsEl.appendChild(makeCard({
            imgSrc: 'images/card-3-artefact.jpg',
            imgAlt: 'Team selection board',
            preamble: 'Here\u2019s the bit that comes up again and again. Selection is the loudest thing a program does. If the stated values and the actual picks don\u2019t line up, people believe the picks. Not the policy, not the criteria on paper, not the press release. Who gets picked tells everyone what the program actually values.',
            instruction: 'So here\u2019s my question',
            question: 'What\u2019s the loudest thing in your world, the thing people read as the real answer to \u201cwhat does this program actually reward?\u201d',
            voiceStateKey: 'q3_voice'
        }));

        // Card 4 — Small room
        cardsEl.appendChild(makeCard({
            imgSrc: 'images/card-4-small-room.jpg',
            imgAlt: 'Small coaching huddle',
            preamble: 'One pattern runs through all the cases. Nobody reformed the whole program at once. They started with a small group inside it, running the new way. Pat Lam\u2019s first move at Connacht was two senior players who already behaved the way he wanted, held up as the reference point. The All Blacks rebuild worked the same way. Twelve to sixteen people, meeting often, attitude mattering more than form for selection. The group writes its own one-page standard on day one and it holds.',
            instruction: 'So here\u2019s my question',
            question: 'Does a shape like that fit somewhere in your world?',
            voiceStateKey: 'q4_voice',
            voicePlaceholder: 'If yes, who\u2019d be in the room and who\u2019d run it. If no, what\u2019s different about your setup.'
        }));

        // Card 5 — Positive deviance
        cardsEl.appendChild(makeCard({
            imgSrc: 'images/card-5-deviance.jpg',
            imgAlt: 'Senior coach mentoring a player',
            preamble: 'One idea runs through the research. Find the people inside your current system who already behave the way you want, and spread their practice. That works better than trying to import a new culture from outside. Brailsford at British Cycling didn\u2019t announce a new culture. He said the program would measure everything it wasn\u2019t measuring and improve each bit by one percent. The day to day work was making it normal for people to be honest about the gaps.',
            instruction: 'So here\u2019s my question',
            question: 'Who comes to mind in your world? Names, a coach whose sessions already feel right. Whatever\u2019s in your head.',
            voiceStateKey: 'q5_voice'
        }));

        // Card 6 — Open
        cardsEl.appendChild(makeCard({
            useAsterisk: true,
            question: 'What\u2019s in your head about this that these questions don\u2019t touch at all?',
            voiceStateKey: 'q6_voice'
        }));

        column.appendChild(cardsEl);

        // Submit
        var submitSection = document.createElement('div');
        submitSection.className = 'cp-submit';

        var submitWrap = document.createElement('div');
        submitWrap.className = 'cp-submit-wrap submit-wrap';

        var draftIndicator = document.createElement('span');
        draftIndicator.id = 'draft-saved-indicator';
        draftIndicator.className = 'draft-saved-indicator';
        draftIndicator.textContent = '\u2022 Draft saved';
        submitWrap.appendChild(draftIndicator);

        var submitBtn = document.createElement('button');
        submitBtn.id = 'submit-btn';
        submitBtn.type = 'button';
        submitBtn.className = 'btn-submit-cp btn-submit';
        submitBtn.textContent = 'Send your reply \u2192';
        submitWrap.appendChild(submitBtn);

        var errorMsg = document.createElement('div');
        errorMsg.id = 'error-message';
        errorMsg.className = 'cp-error-msg error-message';
        errorMsg.innerHTML = 'Something went wrong \u2014 please try again or email <a href="mailto:hello@croquetclaude.com">hello@croquetclaude.com</a>.';
        submitWrap.appendChild(errorMsg);

        submitSection.appendChild(submitWrap);
        column.appendChild(submitSection);

        var footer = document.createElement('footer');
        footer.className = 'cp-footer';
        footer.innerHTML = 'Your answers autosave as you type. Close the page and come back anytime.<br><a href="https://croquetclaude.com/privacy">Privacy note</a>';
        column.appendChild(footer);

        app.innerHTML = '';
        app.appendChild(column);

        // Submit handler
        submitBtn.addEventListener('click', async function() {
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Sending\u2026';
            errorMsg.classList.remove('visible');

            var ok = await window.submitMission(tokenRecord, buildPayload(), respondentName);
            if (!ok) {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send your reply \u2192';
                errorMsg.classList.add('visible');
            }
        });

        // Autosave
        autosave = window.createAutosave(tokenRecord, buildPayload);

        // Restore draft notice
        if (draft) {
            var anchor = document.getElementById('draft-notice-anchor');
            if (anchor) {
                var noticeEl = document.createElement('div');
                noticeEl.className = 'draft-restored-notice';
                var rel = (function(dateStr) {
                    if (!dateStr) return null;
                    var then = new Date(dateStr);
                    if (isNaN(then.getTime())) return null;
                    var diffMs = Date.now() - then.getTime();
                    var diffMins = Math.floor(diffMs / 60000);
                    if (diffMins < 1) return 'just now';
                    if (diffMins < 60) return diffMins + ' minute' + (diffMins === 1 ? '' : 's') + ' ago';
                    var diffHours = Math.floor(diffMins / 60);
                    if (diffHours < 24) return diffHours + ' hour' + (diffHours === 1 ? '' : 's') + ' ago';
                    var diffDays = Math.floor(diffHours / 24);
                    return diffDays + ' day' + (diffDays === 1 ? '' : 's') + ' ago';
                })(tokenRecord.updated);
                noticeEl.textContent = 'Draft from ' + (rel || 'earlier') + ' restored.';
                anchor.appendChild(noticeEl);
            }
        }

        // GSAP scroll animations
        if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches && window.gsap && window.ScrollTrigger) {
            gsap.registerPlugin(ScrollTrigger);
            document.querySelectorAll('.question-card').forEach(function(card) {
                gsap.from(card, {
                    opacity: 0,
                    y: 24,
                    duration: 0.6,
                    ease: 'power2.out',
                    scrollTrigger: {
                        trigger: card,
                        start: 'top 88%'
                    }
                });
            });
        }
    };

    document.addEventListener('DOMContentLoaded', function() {
        window.initMission();
    });
    </script>
</body>
</html>
